<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Подготовка к экзамену</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22;
  --color-success-bg: #d4dfcc;
  --color-error: #a12c7b;
  --color-error-bg: #e0ced7;
  --color-warning: #964219;
  --color-warning-bg: #ddcfc6;
  --shadow-md: 0 4px 12px rgba(40,37,29,0.08);
  --shadow-lg: 0 12px 32px rgba(40,37,29,0.12);
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --font-body: 'Inter', sans-serif;
}
[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45;
  --color-success-bg: #3a4435;
  --color-error: #d163a7;
  --color-error-bg: #4c3d46;
  --color-warning: #bb653b;
  --color-warning-bg: #564942;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100dvh;
  font-size: 1rem;
  line-height: 1.6;
  transition: background 200ms, color 200ms;
}
/* NAV */
.app-nav {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: 0.75rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-md);
}
.app-logo {
  display: flex; align-items: center; gap: 0.6rem;
  font-weight: 700; font-size: 1.05rem; color: var(--color-primary);
  text-decoration: none;
}
.app-logo svg { flex-shrink: 0; }
.theme-toggle {
  background: none; border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 0.35rem 0.6rem;
  color: var(--color-text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.85rem;
  transition: border-color 180ms, color 180ms, background 180ms;
}
.theme-toggle:hover { border-color: var(--color-primary); color: var(--color-primary); }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* HOME */
.home-hero {
  padding: 3rem 1.25rem 2rem;
  max-width: 780px; margin: 0 auto;
}
.home-hero h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; }
.home-hero p { color: var(--color-text-muted); font-size: 1rem; margin-bottom: 2rem; }

.block-grid {
  max-width: 780px; margin: 0 auto;
  padding: 0 1.25rem 3rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr));
  gap: 1rem;
}
.block-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: 1.25rem 1.5rem;
  box-shadow: var(--shadow-md);
  transition: box-shadow 180ms, transform 180ms, border-color 180ms;
  cursor: pointer;
}
.block-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--color-primary); }
.block-card.exam-card { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.block-card .block-num { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-primary); margin-bottom: 0.3rem; }
.block-card .block-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
.block-card .block-meta { font-size: 0.82rem; color: var(--color-text-muted); }
.block-card .block-progress { margin-top: 0.75rem; }
.block-progress-bar { height: 5px; background: var(--color-divider); border-radius: 99px; overflow: hidden; }
.block-progress-fill { height: 100%; background: var(--color-primary); border-radius: 99px; transition: width 400ms cubic-bezier(0.16,1,0.3,1); }
.block-progress-label { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.3rem; }

.block-actions { display: flex; gap: 0.5rem; margin-top: 0.9rem; }
.block-btn {
  flex: 1; padding: 0.5rem 0.5rem; border-radius: var(--radius-md);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; text-align: center;
  transition: background 180ms, border-color 180ms, color 180ms, transform 100ms;
  border: 1.5px solid var(--color-border);
  background: var(--color-surface-2); color: var(--color-text-muted);
  line-height: 1.3;
}
.block-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-highlight); }
.block-btn:active { transform: scale(0.97); }
.block-btn.btn-all { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.block-btn.btn-all:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); color: #fff; }

/* QUIZ */
.quiz-wrapper {
  max-width: 720px; margin: 0 auto;
  padding: 1.5rem 1.25rem 4rem;
}
.quiz-header {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1.5rem; flex-wrap: wrap;
}
.quiz-back-btn {
  background: none; border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 0.35rem 0.75rem;
  color: var(--color-text-muted); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; gap: 0.3rem;
  transition: border-color 180ms, color 180ms;
  white-space: nowrap;
}
.quiz-back-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.quiz-title { font-weight: 700; font-size: 1.1rem; flex: 1; }
.quiz-mode-badge {
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 0.25rem 0.65rem;
  border-radius: 99px; background: var(--color-primary-highlight);
  color: var(--color-primary);
}
.quiz-progress-wrap { margin-bottom: 1.25rem; }
.quiz-progress-text {
  display: flex; justify-content: space-between;
  font-size: 0.82rem; color: var(--color-text-muted); margin-bottom: 0.35rem;
}
.quiz-progress-bar { height: 6px; background: var(--color-divider); border-radius: 99px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--color-primary); border-radius: 99px; transition: width 400ms cubic-bezier(0.16,1,0.3,1); }

.question-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 1rem;
}
.question-topic { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-primary); margin-bottom: 0.5rem; }
.question-text { font-size: 1rem; font-weight: 500; line-height: 1.5; margin-bottom: 1.25rem; }

.options-list { display: flex; flex-direction: column; gap: 0.6rem; }
.option-btn {
  width: 100%; text-align: left;
  background: var(--color-surface-2);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 0.75rem 1rem;
  font-size: 0.95rem; color: var(--color-text);
  cursor: pointer; display: flex; align-items: flex-start; gap: 0.75rem;
  transition: border-color 180ms, background 180ms, color 180ms;
  line-height: 1.45;
}
.option-btn:hover:not(:disabled) { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.option-btn:disabled { cursor: default; }
.option-letter {
  flex-shrink: 0; width: 1.6rem; height: 1.6rem;
  border-radius: 50%; background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 700; color: var(--color-text-muted);
  transition: background 180ms, border-color 180ms, color 180ms;
  margin-top: 1px;
}
.option-btn.correct { background: var(--color-success-bg); border-color: var(--color-success); }
.option-btn.correct .option-letter { background: var(--color-success); border-color: var(--color-success); color: #fff; }
.option-btn.wrong { background: var(--color-error-bg); border-color: var(--color-error); }
.option-btn.wrong .option-letter { background: var(--color-error); border-color: var(--color-error); color: #fff; }
.option-btn.selected-correct { background: var(--color-success-bg); border-color: var(--color-success); }
.option-btn.selected-wrong { background: var(--color-error-bg); border-color: var(--color-error); }

.feedback-box {
  border-radius: var(--radius-md); padding: 0.75rem 1rem;
  font-size: 0.9rem; margin-top: 1rem; display: none;
  align-items: flex-start; gap: 0.5rem; line-height: 1.5;
}
.feedback-box.show { display: flex; }
.feedback-box.correct { background: var(--color-success-bg); color: var(--color-success); border: 1px solid var(--color-success); }
.feedback-box.wrong { background: var(--color-error-bg); color: var(--color-error); border: 1px solid var(--color-error); }
.feedback-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }

.quiz-nav { display: flex; justify-content: flex-end; margin-top: 1.25rem; }
.btn-next {
  background: var(--color-primary); color: #fff;
  border: none; border-radius: var(--radius-md);
  padding: 0.65rem 1.5rem; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; display: none; align-items: center; gap: 0.4rem;
  transition: background 180ms, transform 100ms;
}
.btn-next.show { display: flex; }
.btn-next:hover { background: var(--color-primary-hover); }
.btn-next:active { transform: scale(0.97); }

/* RESULTS */
.results-wrap {
  max-width: 580px; margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
  text-align: center;
}
.results-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
.results-score { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; color: var(--color-primary); margin-bottom: 0.25rem; }
.results-subtitle { color: var(--color-text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
.results-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: 0.9rem 0.5rem;
}
.stat-card .stat-val { font-size: 1.5rem; font-weight: 700; }
.stat-card .stat-lbl { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.15rem; }
.stat-card.correct-stat .stat-val { color: var(--color-success); }
.stat-card.wrong-stat .stat-val { color: var(--color-error); }
.results-actions { display: flex; flex-direction: column; gap: 0.75rem; }
.btn-primary {
  background: var(--color-primary); color: #fff; border: none;
  border-radius: var(--radius-md); padding: 0.75rem 1.5rem;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%;
  transition: background 180ms;
}
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-outline {
  background: none; color: var(--color-text); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 0.75rem 1.5rem;
  font-size: 0.95rem; font-weight: 500; cursor: pointer; width: 100%;
  transition: border-color 180ms, color 180ms;
}
.btn-outline:hover { border-color: var(--color-primary); color: var(--color-primary); }

/* REVIEW */
.review-item {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); padding: 1.25rem;
  margin-bottom: 0.75rem;
}
.review-item.was-correct { border-color: var(--color-success); }
.review-item.was-wrong { border-color: var(--color-error); }
.review-topic { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); margin-bottom: 0.4rem; }
.review-q { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.75rem; }
.review-answers { display: flex; flex-direction: column; gap: 0.4rem; }
.review-opt {
  padding: 0.5rem 0.75rem; border-radius: var(--radius-md);
  font-size: 0.88rem; border: 1px solid var(--color-border);
  display: flex; align-items: center; gap: 0.5rem;
}
.review-opt.correct-ans { background: var(--color-success-bg); border-color: var(--color-success); }
.review-opt.wrong-chosen { background: var(--color-error-bg); border-color: var(--color-error); }

/* RESPONSIVE */
@media (max-width: 575px) {
  .quiz-wrapper { padding: 1rem 0.85rem 3rem; }
  .home-hero { padding: 2rem 0.85rem 1.5rem; }
  .block-grid { padding: 0 0.85rem 2rem; }
  .question-card { padding: 1.1rem; }
  .results-wrap { padding: 1.5rem 0.85rem 3rem; }
  .results-stats { grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
}

/* DARK MODE media fallback */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a; --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
    --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
    --color-success: #6daa45; --color-success-bg: #3a4435;
    --color-error: #d163a7; --color-error-bg: #4c3d46;
    --color-warning: #bb653b; --color-warning-bg: #564942;
  }
}

/* Animations */
@keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.question-card { animation: fadeInUp 250ms cubic-bezier(0.16,1,0.3,1) both; }
</style>
</head>
<body>

<nav class="app-nav">
  <a class="app-logo" href="#" onclick="showScreen('home'); return false;">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-label="Логотип">
      <rect width="26" height="26" rx="6" fill="var(--color-primary)"/>
      <rect x="5" y="6" width="10" height="2.5" rx="1.25" fill="white"/>
      <rect x="5" y="10.5" width="16" height="2.5" rx="1.25" fill="white"/>
      <rect x="5" y="15" width="12" height="2.5" rx="1.25" fill="white"/>
      <circle cx="20" cy="19" r="4" fill="var(--color-bg)" stroke="white" stroke-width="1.5"/>
      <path d="M18.5 19l1 1 2-2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    ЭкзаменТест
  </a>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Сменить тему">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <span id="themeLabel">Светлая</span>
  </button>
</nav>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h1>Подготовка к экзамену</h1>
    <p>Выберите блок для тренировки или запустите полный экзамен из всех 5 блоков.</p>
  </div>
  <div class="block-grid" id="blockGrid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrapper">
    <div class="quiz-header">
      <button class="quiz-back-btn" onclick="confirmBack()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        Назад
      </button>
      <span class="quiz-title" id="quizTitle">Тест</span>
      <span class="quiz-mode-badge" id="quizModeBadge">Тренировка</span>
    </div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-text">
        <span>Вопрос <span id="qCurrent">1</span> из <span id="qTotal">10</span></span>
        <span id="qScore">0 правильных</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div>
      </div>
    </div>
    <div id="questionArea"></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div class="results-wrap">
    <div class="results-emoji" id="resultsEmoji">🎉</div>
    <div class="results-score" id="resultsScore">0/0</div>
    <div class="results-subtitle" id="resultsSubtitle">Результат теста</div>
    <div class="results-stats">
      <div class="stat-card correct-stat">
        <div class="stat-val" id="statCorrect">0</div>
        <div class="stat-lbl">Верно</div>
      </div>
      <div class="stat-card wrong-stat">
        <div class="stat-val" id="statWrong">0</div>
        <div class="stat-lbl">Ошибки</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statPct">0%</div>
        <div class="stat-lbl">Результат</div>
      </div>
    </div>
    <div class="results-actions">
      <button class="btn-primary" onclick="retryQuiz()">🔄 Пройти снова</button>
      <button class="btn-outline" id="btnReview" onclick="showReview()">📋 Разбор ошибок</button>
      <button class="btn-outline" onclick="showScreen('home')">🏠 На главную</button>
    </div>
  </div>
  <!-- Review section -->
  <div id="reviewSection" style="display:none; max-width:720px; margin:0 auto; padding:0 1.25rem 4rem;">
    <h2 style="font-size:1.1rem; font-weight:700; margin-bottom:1rem; color:var(--color-text);">Разбор вопросов</h2>
    <div id="reviewList"></div>
  </div>
</div>

<script>
// =================== DATA ===================
const BLOCKS = [
  {
    id: 1,

             "Оценка и планирование", "Управление проектом", "Реляционная модель данных", "Язык SQL"],
    questions: [

      {

      {
        topic: "Жизненный цикл",
        q: "Возврат на предыдущий этап жизненного цикла предполагает…",
        correct: "пересмотр и изменение выполненных работ, внедрение новых требований и дополнительные затраты",
        wrong: ["автоматическую синхронизацию документации", "применение CASE-инструментов для рефакторинга", "переназначение ответственных исполнителей"]
      },
      {
        topic: "Жизненный цикл",
        q: "Процесс, который НЕ является этапом жизненного цикла, это …",
        correct: "формирование проектной команды",
        wrong: ["проектирование архитектуры системы", "тестирование программного обеспечения", "сопровождение и поддержка системы"]
      },
      {
        topic: "Жизненный цикл",
        q: "Недостаток инкрементной модели жизненного цикла — это …",
        correct: "постоянные изменения нарушают структуру системы",

// =================== STATE ===================
let currentQuiz = null; // { questions, mode, blockId, current, score, answers, shuffled }

// =================== LOCALSTORAGE ===================
function getProgress() {
  try { return JSON.parse(localStorage.getItem('exam_progress') || '{}'); } catch(e) { return {}; }
}
function saveProgress(blockId, score, total) {
  const p = getProgress();
  const key = 'b' + blockId;
  if (!p[key]) p[key] = { attempts: 0, best: 0, total };
  p[key].attempts++;
  if (score > p[key].best) p[key].best = score;
  p[key].total = total;
  localStorage.setItem('exam_progress', JSON.stringify(p));
}

// =================== UTILS ===================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(q) {
  const opts = shuffle([q.correct, ...q.wrong]);
  return { opts, correctIdx: opts.indexOf(q.correct) };
}

function getBlockQuestions(blockId) {
  const block = BLOCKS.find(b => b.id === blockId);
  if (!block || block.questions.length === 0) return [];
  // One question per topic, shuffled within block
  const byTopic = {};
  block.questions.forEach(q => {
    if (!byTopic[q.topic]) byTopic[q.topic] = [];
    byTopic[q.topic].push(q);
  });
  const picked = Object.values(byTopic).map(qs => qs[Math.floor(Math.random() * qs.length)]);
  return shuffle(picked);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

          1 вопрос<br>на тему
        </button>
        <button class="block-btn btn-all" onclick="event.stopPropagation(); startBlockAll(${b.id})">
          Все вопросы<br>(${b.questions.length})
        </button>
      </div>`;

    card.innerHTML = `
      <div class="block-num">Блок ${b.id}</div>
      <div class="block-title">${b.title}</div>
      <div class="block-meta">${isEmpty ? 'Вопросы ещё не добавлены' : b.questions.length + ' вопросов · ' + topicCount + ' тем'}</div>
      ${progressHTML}
      ${actionsHTML}
    `;
    grid.appendChild(card);
  });
}

// =================== START QUIZ ===================
function startBlock(blockId) {
  const qs = getBlockQuestions(blockId);
  if (!qs.length) return;
  const block = BLOCKS.find(b => b.id === blockId);
  currentQuiz = {
    questions: qs,
    mode: 'train',
    blockId,
    blockTitle: 'Блок ' + blockId + ': ' + block.title,
    current: 0,
    score: 0,
    answers: []
  };
  document.getElementById('quizTitle').textContent = 'Блок ' + blockId;
  const badge1 = document.getElementById('quizModeBadge');
  badge1.textContent = 'Тренировка';
  badge1.style.background = '';
  badge1.style.color = '';
  showScreen('quiz');
  renderQuestion();
}

function startBlockAll(blockId) {
  const block = BLOCKS.find(b => b.id === blockId);
  if (!block || !block.questions.length) return;
  const qs = shuffle([...block.questions]);
  currentQuiz = {
    questions: qs,
    mode: 'train-all',
    blockId,
    blockTitle: 'Блок ' + blockId + ': ' + block.title,
    current: 0,
    score: 0,
    answers: []
  };
  document.getElementById('quizTitle').textContent = 'Блок ' + blockId + ' · Все вопросы';
  const badge = document.getElementById('quizModeBadge');
  badge.textContent = 'Все вопросы';
  badge.style.background = 'var(--color-primary)';
  badge.style.color = '#fff';
  showScreen('quiz');
  renderQuestion();
}

function startExam() {
  // Gather one question per topic from all blocks
  let allQuestions = [];
  BLOCKS.forEach(b => {
    const qs = getBlockQuestions(b.id);
    allQuestions = allQuestions.concat(qs);
  });
  allQuestions = shuffle(allQuestions);
  currentQuiz = {
    questions: allQuestions,
    mode: 'exam',
    blockId: 'all',
    blockTitle: 'Экзамен',
    current: 0,
    score: 0,
    answers: []
  };
  document.getElementById('quizTitle').textContent = 'Экзамен';
  const badge2 = document.getElementById('quizModeBadge');
  badge2.textContent = 'Экзамен';
  badge2.style.background = '';
  badge2.style.color = '';
  showScreen('quiz');
  renderQuestion();
}

// =================== RENDER QUESTION ===================
function renderQuestion() {
  const q = currentQuiz;
  const total = q.questions.length;
  const idx = q.current;
  const item = q.questions[idx];

  // Progress
  document.getElementById('qCurrent').textContent = idx + 1;
  document.getElementById('qTotal').textContent = total;
  document.getElementById('qScore').textContent = q.score + ' правильных';
  const pct = (idx / total) * 100;
  document.getElementById('quizProgressFill').style.width = pct + '%';

  // Build card
  const { opts, correctIdx } = shuffleOptions(item);
  const letters = ['А', 'Б', 'В', 'Г'];

  let optHTML = opts.map((o, i) => `
    <button class="option-btn" onclick="selectAnswer(${i}, ${correctIdx})" id="opt-${i}">
      <span class="option-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`).join('');

  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-topic">${item.topic}</div>
      <div class="question-text">${item.q}</div>
      <div class="options-list">${optHTML}</div>
      <div class="feedback-box" id="feedbackBox">
        <span class="feedback-icon" id="feedbackIcon"></span>
        <span id="feedbackText"></span>
      </div>
    </div>
    <div class="quiz-nav">
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">
        ${idx + 1 < total ? 'Следующий' : 'Завершить'}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  `;
}

function selectAnswer(chosenIdx, correctIdx) {
  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    if (i === chosenIdx && chosenIdx !== correctIdx) b.classList.add('wrong');
  });

  const isCorrect = chosenIdx === correctIdx;
  if (isCorrect) currentQuiz.score++;

  // Record answer
  const item = currentQuiz.questions[currentQuiz.current];
  currentQuiz.answers.push({
    item,
    chosen: document.querySelectorAll('.option-btn')[chosenIdx].querySelector('span:last-child').textContent,
    correct: item.correct,
    isCorrect
  });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  const fbIcon = document.getElementById('feedbackIcon');
  const fbText = document.getElementById('feedbackText');
  fb.classList.add('show');
  if (isCorrect) {
    fb.className = 'feedback-box show correct';
    fbIcon.textContent = '✓';
    fbText.textContent = 'Верно!';
  } else {
    fb.className = 'feedback-box show wrong';
    fbIcon.textContent = '✗';
    fbText.innerHTML = 'Неверно. Правильный ответ: <strong>' + item.correct + '</strong>';
  }

  // Show next btn
  const btnNext = document.getElementById('btnNext');
  btnNext.classList.add('show');
}

function nextQuestion() {
  currentQuiz.current++;
  if (currentQuiz.current >= currentQuiz.questions.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

function finishQuiz() {
  const q = currentQuiz;
  const total = q.questions.length;
  const score = q.score;
  const pct = Math.round((score / total) * 100);

  // Save progress per block
  if (q.blockId !== 'all') {
    saveProgress(q.blockId, score, total);
  } else {
    // Save to all blocks roughly
    saveProgress('all', score, total);
  }

  // Emoji
  let emoji = '😔';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 70) emoji = '🎉';
  else if (pct >= 50) emoji = '👍';

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsScore').textContent = score + '/' + total;
  document.getElementById('resultsSubtitle').textContent =
    q.mode === 'exam' ? 'Результат экзамена' : 'Результат тренировки — ' + q.blockTitle;
  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = total - score;
  document.getElementById('statPct').textContent = pct + '%';

  // Update final progress bar
  document.getElementById('quizProgressFill').style.width = '100%';

  document.getElementById('reviewSection').style.display = 'none';
  document.getElementById('btnReview').style.display =
    q.answers.some(a => !a.isCorrect) ? '' : 'none';

  showScreen('results');
  renderHome(); // refresh progress bars
}

function retryQuiz() {
  if (currentQuiz.blockId === 'all') startExam();
  else if (currentQuiz.mode === 'train-all') startBlockAll(currentQuiz.blockId);
  else startBlock(currentQuiz.blockId);
}

function showReview() {
  const section = document.getElementById('reviewSection');
  section.style.display = 'block';
  const list = document.getElementById('reviewList');
  const wrong = currentQuiz.answers.filter(a => !a.isCorrect);
  list.innerHTML = wrong.map(a => `
    <div class="review-item was-wrong">
      <div class="review-topic">${a.item.topic}</div>
      <div class="review-q">${a.item.q}</div>
      <div class="review-answers">
        <div class="review-opt wrong-chosen">✗ Ваш ответ: ${a.chosen}</div>
        <div class="review-opt correct-ans">✓ Верный ответ: ${a.correct}</div>
      </div>
    </div>
  `).join('');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function confirmBack() {
  if (confirm('Прервать тест? Прогресс текущей сессии не сохранится.')) {
    showScreen('home');
  }
}

// =================== THEME ===================
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (theme === 'dark') {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    label.textContent = 'Тёмная';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
    label.textContent = 'Светлая';
  }
}

// =================== INIT ===================
(function() {
  const sys = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', sys);
  updateThemeBtn(sys);
  renderHome();
})();
</script>
